# OpenMetadata local setup via Docker
# Source: https://docs.open-metadata.org/quick-start/local-deployment
#
# Run: docker compose up -d
# UI:  http://localhost:8585
# Login: admin / admin
#
# This is the official OpenMetadata quickstart compose file.
# It spins up OpenMetadata + its dependencies (MySQL, Elasticsearch, Airflow).

version: "3.8"

volumes:
  ingestion-volume-dag-airflow:
  ingestion-volume-dags:
  ingestion-volume-tmp:

services:
  mysql:
    container_name: openmetadata_mysql
    image: openmetadata/db:1.3.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
    expose:
      - 3306
    networks:
      - app_net
    healthcheck:
      test: mysql -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD -e 'SELECT 1'
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    container_name: openmetadata_elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
      - xpack.security.enabled=false
    networks:
      - app_net
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"'
      interval: 15s
      timeout: 10s
      retries: 10

  openmetadata-server:
    container_name: openmetadata_server
    restart: always
    image: openmetadata/server:1.3.4
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: openmetadata_user
      MYSQL_USER_PASSWORD: openmetadata_password
      MYSQL_DATABASE: openmetadata_db
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
    ports:
      - "8585:8585"
      - "8586:8586"
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - app_net

  ingestion:
    container_name: openmetadata_ingestion
    image: openmetadata/ingestion:1.3.4
    depends_on:
      - openmetadata-server
    expose:
      - 8080
    ports:
      - "8080:8080"
    volumes:
      - ingestion-volume-dag-airflow:/airflow/dags
      - ingestion-volume-dags:/opt/airflow/dags
      - ingestion-volume-tmp:/tmp
    environment:
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      OPENMETADATA_HOST: openmetadata-server
      OPENMETADATA_PORT: 8585
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
